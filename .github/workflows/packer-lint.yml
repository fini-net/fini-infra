name: Packer Lint

permissions: {}

on:
  push:
    branches: [main]
    paths:
      - '**/*.pkr.hcl'
      - '.github/workflows/packer-lint.yml'
  pull_request:
    branches: [main]
    paths:
      - '**/*.pkr.hcl'
      - '.github/workflows/packer-lint.yml'

jobs:
  packer-lint:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Setup Packer
        uses: hashicorp/setup-packer@v3.1.0
        with:
          version: ~1.11

      - name: Packer Init
        run: |
          cd l5_compute/packer
          packer init .

      - name: Packer Validate
        run: |
          cd l5_compute/packer
          packer validate .
        env:
          PKR_VAR_deploy_public_key: "ssh-ed25519 AAAAC3NzaC1lZDI1NTE5AAAAIFakeKeyForCIValidationOnly"
          PKR_VAR_snapshot_name_prefix: "ci-validation"
          PKR_VAR_digitalocean_token: "fake-token-for-ci-validation"

      - name: Packer Format Check
        run: packer fmt -check -recursive l5_compute/packer/
